    <!-- Ad Timing Optimization Script -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Stagger ad loading for optimal performance and revenue

            // Load native banner after 1 second
            setTimeout(function() {
                const nativeBanner = document.getElementById('container-b9eaba6088ddcc69a2771c2c98bf19bb');
                if (nativeBanner && !nativeBanner.innerHTML.trim()) {
                    // Trigger native banner if not already loaded
                    console.log('Native banner loading optimized');
                }
            }, 1000);

            // Optimize banner ad loading
            setTimeout(function() {
                // Ensure banner ads are visible
                const bannerAds = document.querySelectorAll('iframe[src*="violationtones.com"]');
                bannerAds.forEach(function(ad, index) {
                    ad.style.opacity = '0';
                    ad.style.transition = 'opacity 0.5s ease';
                    setTimeout(function() {
                        ad.style.opacity = '1';
                    }, index * 500); // Stagger appearance
                });
            }, 2000);

            // Revenue optimization: Track ad interactions
            window.addEventListener('beforeunload', function() {
                // Track page completion for revenue analytics
                if (window.pageData) {
                    console.log('Page ' + window.pageData.page + ' completed with ads');
                }
            });

            // Prevent ad blocking detection
            setTimeout(function() {
                const testAd = document.createElement('div');
                testAd.innerHTML = '&nbsp;';
                testAd.className = 'adsbox';
                document.body.appendChild(testAd);
                setTimeout(function() {
                    if (testAd.offsetHeight === 0) {
                        console.log('Ad blocker detected - revenue impact');
                    }
                    document.body.removeChild(testAd);
                }, 100);
            }, 3000);
        });
    </script>
